name: Generate pacman animation

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clean dist
        run: rm -rf dist && mkdir -p dist

      - name: Generate pacman SVGs
        uses: abozanona/pacman-contribution-graph@main
        with:
          github_user_name: ${{ github.repository_owner }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Debug dist contents
        run: |
          echo "---- dist list ----"
          ls -la dist || true
          echo "---- dist files ----"
          find dist -maxdepth 2 -type f -print || true

      - name: Ensure pacman files exist (fail if missing)
        run: |
          test -f dist/pacman-contribution-graph.svg
          # dark dosyası action'a göre bazen üretilebiliyor/bazen üretilmeyebiliyor
          # sen README'de dark kullanıyorsun, o yüzden bunu da zorunlu yapalım:
          test -f dist/pacman-contribution-graph-dark.svg

      - name: Deploy to output branch (overwrite)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: output
          publish_dir: ./dist
          force_orphan: true
